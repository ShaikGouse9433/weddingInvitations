<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Wedding Invitation</title>

    <meta name="theme-color" content="#5b2c83">

    <!-- Google Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Cinzel:wght@500;700&family=Great+Vibes&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<!-- ==========================================
     PREMIUM GOLD BORDER
========================================== -->

<div class="goldBorder"></div>

<!-- ==========================================
     BACKGROUND MUSIC
========================================== -->

<audio id="bgMusic"
       preload="auto"
       loop>

    <source src="music/Wsong.mpeg"
            type="audio/mpeg">

</audio>

<!-- ==========================================
     PREMIUM PARTICLES
========================================== -->

<div class="sparkles"
     aria-hidden="true"></div>

<div class="flowers"
     aria-hidden="true"></div>

<!-- ==========================================
     PREMIUM ENVELOPE
========================================== -->

<div id="envelopeContainer">

    <div id="envelope">

        <!-- Envelope Background -->

        <div class="back"></div>

        <!-- Invitation Preview -->

        <div id="letter">

            <img
                src="images/page01.jpeg"
                id="invitationPreview"
                loading="eager"
                decoding="async"
                draggable="false"
                alt="Wedding Invitation">

        </div>

        <!-- Left Fold -->

        <div class="leftFold"></div>

        <!-- Right Fold -->

        <div class="rightFold"></div>

        <!-- Bottom Fold -->

        <div class="bottomFold"></div>

        <!-- Top Flap -->

        <div class="topFold">

            <div class="flapShine"></div>

        </div>

        <!-- Premium Gold Wax Seal -->

        <div id="seal">

            <div class="sealCircle">

                <span class="sealText">
                    SA
                </span>

            </div>

            <small>Tap to Open</small>

        </div>

    </div>

</div>

<!-- ==========================================
     INVITATION PAGES
========================================== -->

<div id="pages">

    <!-- =====================
         PAGE 1
    ====================== -->

    <div class="page">

        <img
            src="images/page01.jpeg"
            loading="lazy"
            decoding="async"
            draggable="false"
            alt="Invitation Page 1">

    </div>

    <!-- =====================
         PAGE 2
    ====================== -->

    <div class="page">

        <img
            src="images/page02.jpeg"
            loading="lazy"
            decoding="async"
            draggable="false"
            alt="Invitation Page 2">

    </div>

    <!-- =====================
         PAGE 3
    ====================== -->

    <div class="page">

        <img
            src="images/page03.jpeg"
            loading="lazy"
            decoding="async"
            draggable="false"
            alt="Invitation Page 3">

    </div>

    <!-- =====================
         PAGE 4
    ====================== -->

    <div class="page">

        <img
            src="images/page04.jpeg"
            loading="lazy"
            decoding="async"
            draggable="false"
            alt="Invitation Page 4">

    </div>

    <!-- ======================================
         PREMIUM PURPLE COUNTDOWN
    ======================================= -->

    <div class="countdownPage">

        <h1>
            Wedding Countdown
        </h1>

        <div class="timer">

            <div>

                <span id="days">00</span>

                <p>Days</p>

            </div>

            <div>

                <span id="hours">00</span>

                <p>Hours</p>

            </div>

            <div>

                <span id="minutes">00</span>

                <p>Minutes</p>

            </div>

            <div>

                <span id="seconds">00</span>

                <p>Seconds</p>

            </div>

        </div>

    </div>
        <!-- =====================
         PAGE 5
    ====================== -->

    <div class="page">

        <img
            src="images/page05.jpeg"
            loading="lazy"
            decoding="async"
            draggable="false"
            alt="Invitation Page 5">

    </div>

    <!-- =====================
         PAGE 6
    ====================== -->

    <div class="page">

        <img
            src="images/page06.jpeg"
            loading="lazy"
            decoding="async"
            draggable="false"
            alt="Invitation Page 6">

    </div>

    <!-- =====================
         PAGE 7
    ====================== -->

    <div class="page">

        <img
            src="images/page07.jpeg"
            loading="lazy"
            decoding="async"
            draggable="false"
            alt="Invitation Page 7">

    </div>

    <!-- =====================
         PAGE 8
    ====================== -->

    <div class="page">

        <img
            src="images/page08.jpeg"
            loading="lazy"
            decoding="async"
            draggable="false"
            alt="Invitation Page 8">

    </div>

</div>

<!-- ==========================================
     PREMIUM CONTROLS
========================================== -->

<div class="controls">

    <!-- Previous -->

    <button
        id="prev"
        aria-label="Previous Page"
        title="Previous Page">

        <i class="fa-solid fa-arrow-left"></i>

    </button>

    <!-- Next -->

    <button
        id="next"
        aria-label="Next Page"
        title="Next Page">

        <i class="fa-solid fa-arrow-right"></i>

    </button>

    <!-- Music -->

    <button
        id="musicBtn"
        aria-label="Music"
        title="Music">

        <i class="fa-solid fa-volume-high"></i>

    </button>

</div>

<!-- ==========================================
     JAVASCRIPT
========================================== -->

<script src="script.js"></script>

</body>

</html>
