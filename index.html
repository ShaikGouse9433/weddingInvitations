<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

</head>

<body>

<!-- Background Music -->
<audio id="bgMusic" loop>
    <source src="music/Wsong.mpeg" type="audio/mp3">
</audio>

<!-- Premium Sparkles -->
<div class="sparkles"></div>

<!-- Premium Flowers -->
<div class="flowers"></div>

<!-- ======================================
        PREMIUM LUXURY ENVELOPE
======================================= -->

<div id="envelopeContainer">

    <div id="envelope">

        <!-- Back -->
        <div class="back"></div>

        <!-- Letter -->

        <div id="letter">

            <img src="images/page01.jpeg"
                 id="invitationPreview"
                 alt="Wedding Invitation">

        </div>

        <!-- Left Fold -->
        <div class="leftFold"></div>

        <!-- Right Fold -->
        <div class="rightFold"></div>

        <!-- Bottom Fold -->
        <div class="bottomFold"></div>

        <!-- Top Fold -->
        <div class="topFold"></div>

        <!-- Premium Wax Seal -->

        <div id="seal">

            <div class="sealCircle">

                <span class="sealText">SA</span>

            </div>

            <div class="tapText">
                Tap to Open
            </div>

        </div>

    </div>

</div>

<!-- ======================================
            INVITATION PAGES
======================================= -->

<div id="pages">

    <div class="page">
        <img src="images/page01.jpeg" alt="">
    </div>

    <div class="page">
        <img src="images/page02.jpeg" alt="">
    </div>

    <div class="page">
        <img src="images/page03.jpeg" alt="">
    </div>

    <div class="page">
        <img src="images/page04.jpeg" alt="">
    </div>

    <!-- Countdown -->

    <div class="countdownPage">

        <h1>Wedding Countdown</h1>

        <div class="timer">

            <div>
                <span id="days">00</span>
                <p>Days</p>
            </div>

            <div>
                <span id="hours">00</span>
                <p>Hours</p>
            </div>

            <div>
                <span id="minutes">00</span>
                <p>Minutes</p>
            </div>

            <div>
                <span id="seconds">00</span>
                <p>Seconds</p>
            </div>

        </div>

    </div>

    <div class="page">
        <img src="images/page05.jpeg" alt="">
    </div>

    <div class="page">
        <img src="images/page06.jpeg" alt="">
    </div>

    <div class="page">
        <img src="images/page07.jpeg" alt="">
    </div>

    <div class="page">
        <img src="images/page08.jpeg" alt="">
    </div>

</div>

<!-- ======================================
            CONTROLS
======================================= -->

<div class="controls">

    <button id="prev" title="Previous">
        <i class="fa-solid fa-arrow-left"></i>
    </button>

    <button id="next" title="Next">
        <i class="fa-solid fa-arrow-right"></i>
    </button>

    <button id="musicBtn" title="Music">
        <i class="fa-solid fa-volume-high"></i>
    </button>

</div>

<script src="script.js"></script>

</body>

</html>
