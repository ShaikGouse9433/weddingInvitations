<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link rel="stylesheet" href="style.css">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

</head>

<body>

<audio id="bgMusic" loop>
<source src="music/weddingsong.mp3" type="audio/mp3">
</audio>

<!-- Sparkles -->
<div class="sparkles"></div>

<!-- Flower Animation -->
<div class="flowers"></div>

<!-- ===========================
     PREMIUM ENVELOPE
=========================== -->

<div id="envelopeContainer">

    <div id="envelope">

        <!-- Back -->

        <div class="back"></div>

        <!-- Letter -->

       <div id="letter">

    <img src="images/page1.jpeg" id="invitationPreview">

</div>
        <!-- Left Fold -->

        <div class="leftFold"></div>

        <!-- Right Fold -->

        <div class="rightFold"></div>

        <!-- Bottom Fold -->

        <div class="bottomFold"></div>

        <!-- Top Flap -->

        <div class="topFold"></div>

        <!-- Wax Seal -->

        <div id="seal">

            <div class="sealCircle">
                SA
            </div>

            <small>Tap to Open</small>

        </div>

    </div>

</div>

<!-- Pages -->

<div id="pages">

<div class="page">
<img src="images/page1.jpeg">
</div>

<div class="page">
<img src="images/page2.jpeg">
</div>

<div class="page">
<img src="images/page3.jpeg">
</div>

<div class="page">
<img src="images/page4.jpeg">
</div>

<!-- Countdown -->

<div class="countdownPage">

<h1>Wedding Countdown</h1>

<div class="timer">

<div>
<span id="days">00</span>
<p>Days</p>
</div>

<div>
<span id="hours">00</span>
<p>Hours</p>
</div>

<div>
<span id="minutes">00</span>
<p>Minutes</p>
</div>

<div>
<span id="seconds">00</span>
<p>Seconds</p>
</div>

</div>

</div>

<div class="page">
<img src="images/page5.jpeg">
</div>

<div class="page">
<img src="images/page6.jpeg">
</div>

<div class="page">
<img src="images/page7.jpeg">
</div>

<div class="page">
<img src="images/page8.jpeg">
</div>

</div>

<!-- Controls -->

<div class="controls">

<button id="prev">
<i class="fa-solid fa-arrow-left"></i>
</button>

<button id="next">
<i class="fa-solid fa-arrow-right"></i>
</button>

<button id="musicBtn">
<i class="fa-solid fa-volume-high"></i>
</button>

</div>

<script src="script.js"></script>

</body>
</html>
